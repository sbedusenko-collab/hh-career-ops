# Профиль соискателя — Бедусенко Вячеслав Валерьевич
# Сгенерировано на основе резюме от 08.04.2026

personal:
  name: "Бедусенко Вячеслав Валерьевич"
  target_role: "Директор по ИТ (CIO)"
  experience_years: 21
  location: "Москва"
  relocation: true         # готов к переезду
  remote_preferred: false  # предпочитает офис / на месте работодателя

# Ключевые навыки (по убыванию важности)
skills:
  primary:
    - Управление ИТ-департаментом
    - ИТ-стратегия и цифровизация
    - Информационная безопасность
    - Управление ИТ-инфраструктурой
    - Бюджетирование и закупки
    - VMware vSphere / ESXi
    - Microsoft HyperV
    - Windows Server / Active Directory
    - Linux
    - 1С (ERP, ЗУП, Документооборот, УПП)
  secondary:
    - Cisco / HP / NETAPP
    - Citrix
    - HelpDesk / ServiceDesk
    - IP-телефония (Avaya, Asterisk, M200)
    - СКУД / видеонаблюдение
    - Управление проектами
    - Импортозамещение ПО
    - Виртуализация
    - Резервное копирование
    - DLP / антивирусная защита
  learning:
    - Диспетчеризация промышленной техники
    - IoT / промышленная автоматизация

# Зарплатные ожидания (gross, руб.)
salary:
  min: 300000
  target: 450000
  currency: RUR

# Что важно в работе
priorities:
  remote_work: low           # предпочитает офис
  salary: high
  tech_stack: medium
  company_stability: high    # опыт в крупных компаниях (Газпром)
  career_growth: high        # целевая роль — CIO
  dms: medium
  work_life_balance: medium

# Стоп-слова — вакансии с этими словами получают штраф
dealbreakers:
  - "без опыта"
  - "стажёр"
  - "junior"
  - "младший специалист"
  - "системный администратор"
  - "переезд обязателен"
  - "продажи"
  - "менеджер по продажам"

# Предпочтительные компании (бонус к оценке)
preferred_companies:
  - "Газпром"
  - "Росатом"
  - "Роснефть"
  - "РЖД"
  - "Сибур"
  - "Норникель"
  - "Лукойл"

# Компании-исключения (не рассматривать)
excluded_companies:
  - "ООО \"УК \"АнтрацитИнвестПроект\""   # текущее место работы
  - "ООО \"Газпром морские проекты\""       # текущее место работы

# ID резюме на hh.ru (получить через API или из URL резюме)
resume_id: "YOUR_RESUME_ID"

# Шаблон сопроводительного письма
cover_letter_template: |
  Добрый день!

  Меня заинтересовала ваша вакансия {vacancy_title} в компании {company_name}.

  {ai_generated_body}

  Готов обсудить детали в удобное для вас время.

  С уважением,
  Бедусенко Вячеслав Валерьевич
